<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Grid Layout Example</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @media (max-width: 767.98px) {
      .responsive-row {
        flex-direction: column !important;
      }
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <div class="row">
      <header class="col-12 bg-primary text-white py-3 mb-3 text-center">
        <h1>Header</h1>
      </header>
    </div>
    <div class="row responsive-row d-flex">
      <main class="col-md-8 p-3 bg-light">
        <h2>Main Content</h2>
        <p>This is the main content area. On desktop, it takes up 8 columns.</p>
      </main>
      <aside class="col-md-4 p-3 bg-secondary text-white">
        <h2>Sidebar</h2>
        <p>This is the sidebar. On desktop, it takes up 4 columns.</p>
      </aside>
    </div>
  </div>
</body>
</html>
